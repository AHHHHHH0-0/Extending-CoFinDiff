name: ca-only-fixed
method: bayes
metric:
  name: best_val_loss
  goal: minimize
parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-4
  base_channels:
    values: [16, 32, 64]
  num_res_blocks:
    values: [2, 3]
  beta_schedule:
    values: ['linear', 'cosine']
early_terminate:
  type: hyperband
  min_iter: 100
  eta: 3