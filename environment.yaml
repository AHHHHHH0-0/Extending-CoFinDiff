name: research

channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  - python=3.11

  # Core
  - pytorch>=2.1
  - numpy>=1.23
  - pandas>=2.0
  - matplotlib>=3.7
  - scikit-learn>=1.3
  - tqdm
  - requests
  - python-dotenv
  - ipykernel
  - wandb
  - yfinance
  # dtaidistance is not on conda-forge/defaults; install via pip into this env.
  # PyPI wheels often omit the C library (distance_matrix_fast); use use_c=False or build from source for C speedups.
  - pip
  - pip:
    - dtaidistance
